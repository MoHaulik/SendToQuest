<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <!-- ==========================================
       SUPERCHARGED SEO & META TAGS
       ========================================== -->
  <title>Send to Quest | Instantly Open Links in VR</title>
  <meta name="description" content="Easily send any URL from your phone or desktop directly to your Meta Quest VR headset. Skip the typing in VR—just paste, send, and open." />
  <meta name="keywords" content="Meta Quest, VR, Oculus Quest, Send link to VR, Open URL in Quest, Quest 2, Quest 3, WebXR, VR Browser link" />
  <meta name="author" content="Send to Quest" />
  <meta name="robots" content="index, follow" />
  
  <!-- Open Graph / Facebook / iMessage -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourwebsite.com/" /> <!-- Update this with your actual URL -->
  <meta property="og:title" content="Send to Quest | Instantly Open Links in VR" />
  <meta property="og:description" content="Skip the typing in VR. Paste a link here to send it instantly to your Meta Quest headset." />
  <meta property="og:image" content="SendToQuest.png" /> <!-- Best if you use a high-res 1200x630 image here eventually -->

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://yourwebsite.com/" />
  <meta property="twitter:title" content="Send to Quest | Instantly Open Links in VR" />
  <meta property="twitter:description" content="Skip the typing in VR. Paste a link here to send it instantly to your Meta Quest headset." />
  <meta property="twitter:image" content="SendToQuest.png" />

  <!-- Prevent caching so that returning to the site refreshes -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <!-- Viewport meta tag for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Favicon for all browsers -->
  <link rel="icon" type="image/png" href="SendToQuest2.png">
  <link rel="shortcut icon" type="image/png" href="SendToQuest2.png">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-user-drag: none;
      background: #ffffff;
    }
    
    /* ======================================
       CANVAS WITH RANDOM APPLE-LIKE GRADIENTS
       ====================================== */
    canvas {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
    }
    
    /* ======================================
       SUBTLE APPLE "POP": GLOW RING
       ====================================== */
    .glow-ring {
      position: absolute;
      top: 50%; 
      left: 50%;
      width: 400px; 
      height: 400px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      background: radial-gradient(
          rgba(255,255,255,0.3), 
          rgba(255,255,255,0.0) 70%
      );
      animation: ringFloat 8s ease-in-out infinite alternate;
      z-index: 2;
      mix-blend-mode: screen;
    }
    
    @keyframes ringFloat {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1.2); }
    }
    
    /* ======================================
       UI ELEMENTS (Desktop/Tablet Layout)
       ====================================== */
    .input-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 600px; /* fixed layout width for desktop */
      z-index: 1000;
    }

    /* --------------------------------------------------------
       INTRO TEXT (WeTransfer Style)
       -------------------------------------------------------- */
    .intro-text {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      padding: 0 20px;
    }

    .intro-text h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
    }

    .intro-text p {
      font-size: 16px;
      font-weight: 400;
      margin: 0;
      line-height: 1.5;
      color: #444;
      opacity: 0.9;
    }
    
    .input-row {
      display: flex;
      align-items: center;
      width: 100%;
      margin-bottom: 0;
      position: relative;
    }
    
    /* Big logo (SendToQuest.png) */
    .big-logo {
      width: 138px;
      margin-right: 10px;
    }
    
    .drop-area {
      flex: 1;
      height: 60px;
      border-radius: 30px;
      background-color: rgba(255,255,255,0.25);
      border: none;
      color: #333;
      font-size: 18px;
      text-align: center;
      line-height: 60px;
      backdrop-filter: blur(10px);
      box-shadow:
        0 2px 3px 1px rgba(180,180,180,0.3),
        inset 0 -10px 20px -10px rgba(255,255,255,0.9);
      cursor: text;
      transition: all 1.33s ease;
      isolation: isolate;
      position: relative;
    }
    
    .drop-area:focus-within,
    .drop-area.dragover {
      transform: scale(1.03);
      box-shadow: 
        0 4px 10px -2px rgba(180,180,180,0.4),
        inset 0 0 0 transparent;
      transition-duration: 0.665s;
    }
    
    /* URL INPUT STYLE */
    .drop-area input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      outline: none;
      text-align: left;
      color: #333;
      font-size: 18px;
      font-family: inherit;
      padding-left: 116px; /* For desktop/tablet */
      box-sizing: border-box;
    }
    
    .suggestions {
      position: absolute;
      top: 100%;
      left: 148px; /* Align with input start */
      width: calc(100% - 148px);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      display: none;
      z-index: 9999;
      margin-top: 5px;
    }
    
    .suggestions.visible {
      display: block;
    }
    
    .suggestions div {
      padding: 10px 20px;
      font-size: 16px;
      color: #333;
      cursor: pointer;
    }
    
    .suggestions div:hover {
      background: rgba(0,0,0,0.05);
    }
    
    /* Button container (Desktop) */
    .button-container {
      margin-top: 10px;
      margin-left: 148px;
      width: calc(100% - 148px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    /* ======================================
       SEND TO QUEST BUTTON (Updated)
       ====================================== */
    .styled-button {
      position: relative;
      padding: 10px 20px;
      background-color: rgba(255,255,255,0.25);
      border: none;
      border-radius: 30px;
      font-size: 18px;
      color: #333;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
      isolation: isolate;
      box-shadow: 0 2px 3px 1px rgba(180,180,180,0.3),
                  inset 0 -10px 20px -10px rgba(255,255,255,0.9);
      transform: scale(1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .styled-button:hover:not(:active),
    .styled-button.active {
      transform: scale(1.05);
      background-color: rgba(255,255,255,0.35);
      box-shadow: 0 4px 8px rgba(180,180,180,0.4);
    }
    
    .styled-button:active {
      transform: scale(0.98);
    }
    
    .styled-button .shimmer {
      position: absolute;
      inset: -40px;
      border-radius: inherit;
      mask-image: conic-gradient(
          from 0deg,
          transparent 0%,
          transparent 10%,
          black 36%,
          black 45%,
          transparent 50%,
          transparent 60%,
          black 85%,
          black 95%,
          transparent 100%
      );
      mask-size: cover;
      mix-blend-mode: plus-lighter;
      animation: shimmer 1s linear infinite both;
    }
    
    .styled-button .shimmer::before,
    .styled-button .shimmer::after {
      transition: all 0.5s ease;
      opacity: 0;
      content: "";
      border-radius: inherit;
      position: absolute;
      mix-blend-mode: color;
      inset: 40px;
      pointer-events: none;
    }
    
    .styled-button .shimmer::before {
      box-shadow: 0 0 3px 2px rgba(255,255,255,0.7),
                  0 0 7px 4px rgba(255,255,255,0.5),
                  0 0 13px 4px rgba(255,255,255,0.4),
                  0 0 25px 5px rgba(255,255,255,0.4);
      z-index: -1;
    }
    
    .styled-button .shimmer::after {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6),
                  inset 0 0 2px 1px rgba(255,255,255,0.4),
                  inset 0 0 5px 2px rgba(255,255,255,0.3);
      z-index: 2;
    }
    
    .styled-button .text {
      color: #333;
      position: relative;
      font-weight: 500;
      z-index: 3;
    }
    
    /* The small logo (SendToQuest2.png) */
    .small-logo {
      width: 60px;
      height: auto;
    }
    
    /* ======================================
       BANNER AD BAR AT THE BOTTOM (Desktop)
       ====================================== */
    #adBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 2000;
      cursor: pointer;
      box-sizing: border-box;
    }
    
    #adBar .ad-content {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 16px;
    }
    
    #adBar .ad-content img {
      width: 40px;
      height: auto;
    }
    
    @keyframes shimmer {
      0% { --shimmer: 0deg; }
      100% { --shimmer: 360deg; }
    }
    
    /* =====================================================
       MOBILE PHONE Adjustments
       ===================================================== */
    @media only screen and (max-width: 480px), only screen and (orientation: portrait) {
      html, body {
        overflow-y: auto;
        overflow-x: hidden;
      }
      
      .input-container {
         width: 90%;
         position: relative;
         top: 60px; /* Adjusted to fit the text better */
         left: 50%;
         transform: translateX(-50%);
         text-align: center;
         padding-bottom: 100px; /* Give space for scrolling above the ad bar */
      }
      
      /* Intro text adjustments for mobile */
      .intro-text h1 {
        font-size: 24px;
      }
      .intro-text p {
        font-size: 15px;
      }

      .input-row {
         flex-direction: column;
         align-items: center;
         margin-bottom: 20px;
      }
      
      .big-logo {
         margin: 0 auto 20px auto;
         width: 150px; 
      }
      
      .drop-area {
         width: 100%;
         margin-bottom: 10px;
         font-size: 20px;
         line-height: 60px;
      }
      
      .drop-area input {
         text-align: center;
         padding-left: 0; 
      }
      
      .suggestions {
         left: 0;
         width: 100%;
         position: relative;
         margin-bottom: 15px;
      }

      .button-container {
         flex-direction: column;
         align-items: center;
         margin-left: 0;
         width: 100%;
         margin-top: 10px;
      }
      
      .styled-button {
         width: auto;
         max-width: 80%;
         margin-bottom: 20px;
      }
      
      .small-logo {
         display: block;
         margin-top: 10px; 
         width: 50px;
         height: auto;
         position: relative;
         z-index: 1010;
      }
      
      #adBar {
         padding: 15px;
         font-size: 16px;
         height: auto;
         justify-content: center;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.2/ua-parser.min.js"></script>
</head>
<body>
  <!-- The canvas for random pastel Apple-like gradients -->
  <canvas id="canv"></canvas>
  <!-- Subtle glow ring for an Apple “pop” effect -->
  <div class="glow-ring"></div>
  
  <!-- Semantic Main Container -->
  <main class="input-container">
    
    <!-- NEW INTRO TEXT -->
    <div class="intro-text" id="introText">
      <h1 id="introTitle">Tired of typing URLs in VR?</h1>
      <p id="introDesc">Paste your link below to send it instantly to your Meta Quest. Powered by Meta's secure network, your page will open automatically the next time you put on your headset.</p>
    </div>

    <!-- Input and button UI with logos -->
    <div class="input-row">
      <img src="SendToQuest.png" alt="Send to Quest Logo" class="big-logo" />
      <div class="drop-area" id="dropArea">
        <input type="text" id="urlInput" placeholder="Enter or paste a URL" autocomplete="off" />
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>
    
    <div class="button-container">
      <button id="openOnQuestButton" class="styled-button">
        <span class="text">Send to Quest</span>
        <div class="shimmer"></div>
      </button>
      <img src="SendToQuest2.png" alt="Send to Quest Small Logo" class="small-logo" />
    </div>
  </main>
  
  <!-- Banner Ad Bar (clickable) -->
  <div id="adBar">
    <div class="ad-content">
      <img src="NXTlogo.png" alt="NXT Logo" />
      <span>Explore and play free VR games now</span>
    </div>
  </div>
  
  <!-- Language Toggle Button (fixed in the corner) -->
  <button id="langToggle" style="position: fixed; top: 10px; right: 10px; background: transparent; border: none; font-size: 24px; cursor: pointer; z-index: 3000;">🇯🇵</button>
  
  <script>
    /*****************************************
     * LOGIC FOR THE URL INPUT AND LOCALSTORAGE
     *****************************************/
    const RECENT_URLS_KEY = 'recentUrls';
    
    function loadRecentUrls() {
      let urls = localStorage.getItem(RECENT_URLS_KEY);
      if (urls) {
        try {
          urls = JSON.parse(urls);
        } catch (e) {
          urls = [];
        }
      } else {
        urls = [];
      }
      return urls;
    }
    
    function saveRecentUrl(newUrl) {
      let urls = loadRecentUrls();
      // Remove if already exists
      urls = urls.filter(u => u !== newUrl);
      // Add to front
      urls.unshift(newUrl);
      // Keep only last 3
      if (urls.length > 3) {
        urls = urls.slice(0, 3);
      }
      localStorage.setItem(RECENT_URLS_KEY, JSON.stringify(urls));
    }
    
    // Play sound effect (sent.mp3) before redirecting.
    function sendLinkToQuest(linkUrl) {
      let finalUrl = linkUrl.trim();
      // Auto-add https:// if missing
      if (!finalUrl.startsWith('https://')) {
        finalUrl = 'https://' + finalUrl.replace(/^https?:\/\//, '');
      }
      // If the URL ends with a slash, explicitly point to index.html
      if (finalUrl.endsWith('/')) {
        finalUrl += 'index.html';
      }
      const encodedUrl = encodeURIComponent(finalUrl);
      const webLaunchEndpoint = `https://www.oculus.com/open_url/?url=${encodedUrl}`;
      saveRecentUrl(finalUrl);
      
      // Play the sent.mp3 sound effect (1 second long) then redirect.
      try {
        const audio = new Audio('sent.mp3');
        audio.play().catch(e => console.log('Audio play prevented by browser:', e));
      } catch (e) {}
      
      setTimeout(() => {
        window.location.href = webLaunchEndpoint;
      }, 1000);
    }
    
    function isQuestHeadset() {
      const parser = new UAParser();
      const result = parser.getResult();
      const browserName = result.browser.name || '';
      const deviceModel = result.device.model || '';
      const isOculusBrowser = browserName.includes('OculusBrowser');
      const isQuestDevice = deviceModel.includes('Quest');
      return isOculusBrowser || isQuestDevice;
    }
    
    function showSuggestions(filteredUrls) {
      const suggestionsBox = document.getElementById('suggestions');
      suggestionsBox.innerHTML = '';
      if (filteredUrls.length > 0) {
        filteredUrls.forEach(url => {
          const div = document.createElement('div');
          div.textContent = url.replace(/^https?:\/\//, '');
          div.addEventListener('click', () => {
            document.getElementById('urlInput').value = url.replace(/^https?:\/\//, '');
            suggestionsBox.classList.remove('visible');
          });
          suggestionsBox.appendChild(div);
        });
        suggestionsBox.classList.add('visible');
      } else {
        suggestionsBox.classList.remove('visible');
      }
    }
    
    function initializePage() {
      const dropArea = document.getElementById('dropArea');
      const urlInput = document.getElementById('urlInput');
      const openOnQuestButton = document.getElementById('openOnQuestButton');
      
      // Handle dragging over the drop area
      dropArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropArea.classList.add('dragover');
      });
      dropArea.addEventListener('dragleave', function() {
        dropArea.classList.remove('dragover');
      });
      dropArea.addEventListener('drop', function(e) {
        e.preventDefault();
        dropArea.classList.remove('dragover');
        const data = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
        if (data) {
          urlInput.value = data.replace(/^https?:\/\//, '');
        }
      });
      
      urlInput.addEventListener('input', () => {
        const inputVal = urlInput.value.trim().toLowerCase();
        if (inputVal === '') {
          document.getElementById('suggestions').classList.remove('visible');
          return;
        }
        const recentUrls = loadRecentUrls();
        const filtered = recentUrls.filter(u => u.toLowerCase().includes(inputVal));
        showSuggestions(filtered);
      });
      
      urlInput.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          openOnQuestButton.click();
        }
      });
      
      // Close suggestions when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.input-row')) {
          document.getElementById('suggestions').classList.remove('visible');
        }
      });
      
      openOnQuestButton.addEventListener('click', function() {
        const url = urlInput.value.trim();
        if (url) {
          sendLinkToQuest(url);
        } else {
          alert(currentLang === 'ja' ? '有効なURLを入力またはドロップしてください。' : 'Please enter or drop a valid URL.');
        }
      });
      
      if (isQuestHeadset()) {
        console.log('Page accessed from Meta Quest headset.');
      }
    }
    
    /*****************************************
     * LANGUAGE TOGGLE FUNCTIONALITY
     *****************************************/
    // Determine initial language based on the browser's language
    let currentLang = (navigator.language && navigator.language.startsWith('ja')) ? 'ja' : 'en';
    
    function updateLanguage() {
      const urlInput = document.getElementById('urlInput');
      const adSpan = document.querySelector('#adBar .ad-content span');
      const langToggle = document.getElementById('langToggle');
      const introTitle = document.getElementById('introTitle');
      const introDesc = document.getElementById('introDesc');
      
      if (currentLang === 'ja') {
        // UI Translations
        urlInput.placeholder = "URL を入力またはペースト";
        adSpan.textContent = "無料のVRゲームを探索して今すぐプレイ！";
        
        // Intro Text Translations
        introTitle.textContent = "VRでのURL入力にうんざりしていませんか？";
        introDesc.textContent = "下の欄にリンクを貼り付けるだけで、Meta Questに即座に送信されます。Metaの安全なネットワークを通じて、次回ヘッドセットを装着したときにページが自動的に開きます。";
        
        // Change toggle button to show US flag for switching back to English.
        langToggle.textContent = "🇺🇸";
      } else {
        // UI Translations
        urlInput.placeholder = "Enter or paste a URL";
        adSpan.textContent = "Explore and play free VR games now";
        
        // Intro Text Translations
        introTitle.textContent = "Tired of typing URLs in VR?";
        introDesc.textContent = "Paste your link below to send it instantly to your Meta Quest. Powered by Meta's secure network, your page will open automatically the next time you put on your headset.";
        
        // Show Japanese flag for switching to Japanese.
        langToggle.textContent = "🇯🇵";
      }
    }
    
    document.getElementById('langToggle').addEventListener('click', function() {
      // Toggle the language on each click.
      currentLang = currentLang === 'en' ? 'ja' : 'en';
      updateLanguage();
    });
    
    // Banner Ad Bar: Clicking anywhere opens the link.
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById("adBar").addEventListener("click", function(e){
        window.open("https://www.nxtwebxr.com", "_blank");
      });
    });
    
    // Force reload if page was restored from cache
    window.onpageshow = function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    };
    
    /*****************************************
     * RANDOM APPLE-LIKE BACKGROUND GRADIENTS
     *****************************************/
    // Allowed gradients only
    const allowedGradients = [
      { code: 2, gradient: 'linear-gradient(180deg, #FFAABD, #FFD2AA, #FEFFCB, #D1FFEE)' },
      { code: 3, gradient: 'linear-gradient(180deg, #FECACA, #FED7E2, #E9D5FF, #CDE4FF)' },
      { code: 4, gradient: 'linear-gradient(180deg, #FFD4D4, #FFF1D4, #DEFFDC, #D4F9FF)' },
      { code: 5, gradient: 'linear-gradient(180deg, #FFD6E8, #FFEAD2, #D2EEFF)' },
      { code: 7, gradient: 'linear-gradient(180deg, #8EC5FC, #E0C3FC)' },
      { code: 8, gradient: 'linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%)' },
      { code: 9, gradient: 'linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%)' },
      { code: 10, gradient: 'linear-gradient(180deg, #fdcbf1 0%, #e6dee9 100%)' },
      { code: 12, gradient: 'linear-gradient(180deg, #ff9a9e 0%, #fad0c4 100%)' },
      { code: 16, gradient: 'linear-gradient(180deg, #ffdde1 0%, #ee9ca7 100%)' },
      { code: 18, gradient: 'linear-gradient(180deg, #ffefd5 0%, #ffe4e1 100%)' }
    ];
    
    // Create a weighted array giving code 9 extra chance
    let weightedGradients = [];
    allowedGradients.forEach(g => {
      if (g.code === 9) {
        for (let i = 0; i < 5; i++) {
          weightedGradients.push(g);
        }
      } else {
        weightedGradients.push(g);
      }
    });
    
    let canvas, ctx;
    
    function initBackground() {
      canvas = document.getElementById('canv');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      
      // Select a random gradient from the weighted array
      const chosen = weightedGradients[Math.floor(Math.random() * weightedGradients.length)];
      canvas.style.background = chosen.gradient;
    }
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initializePage();
      initBackground();
      window.addEventListener('resize', resizeCanvas, false);
      // Set the UI language based on the detected language.
      updateLanguage();
    });
  </script>
</body>
</html>
